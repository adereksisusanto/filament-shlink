name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag version (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.3
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run quality checks
        run: composer check

      - name: Generate release body
        run: |
          printf "## What's Changed\n\n" > /tmp/release-body.md
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          git log "$prev"..HEAD --pretty=format:"- %s" --no-merges >> /tmp/release-body.md
          printf "\n" >> /tmp/release-body.md

      - name: Create Release
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release-body.md \
            --generate-notes \
            --latest
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
