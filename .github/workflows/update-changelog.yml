name: Update Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Update CHANGELOG.md
        run: |
          TAG=$(jq -r '.release.tag_name' "$GITHUB_EVENT_PATH")
          DATE=$(jq -r '.release.published_at' "$GITHUB_EVENT_PATH")
          DATE="${DATE%%T*}"
          BODY=$(jq -r '.release.body' "$GITHUB_EVENT_PATH")

          printf "## %s - %s\n\n%s\n\n" "$TAG" "$DATE" "$BODY" > /tmp/new_entry.md

          if [ -f CHANGELOG.md ]; then
            HEADER=$(head -5 CHANGELOG.md)
            TAIL=$(tail -n +6 CHANGELOG.md)
            echo "$HEADER" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat /tmp/new_entry.md >> CHANGELOG.md
            echo "$TAIL" >> CHANGELOG.md
          else
            printf "# Changelog\n\n" > CHANGELOG.md
            cat /tmp/new_entry.md >> CHANGELOG.md
          fi

      - uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "chore: update CHANGELOG.md for ${{ github.event.release.tag_name }}"
          file_pattern: CHANGELOG.md
