name: Update Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Update CHANGELOG.md
        run: |
          TAG="${{ github.event.release.tag_name }}"
          DATE="${{ github.event.release.published_at }}"
          DATE="${DATE%%T*}"
          BODY="${{ github.event.release.body }}"

          ENTRY="## ${TAG} - ${DATE}\n\n${BODY}\n\n"
          echo -e "${ENTRY}" > /tmp/new_entry.md

          if [ -f CHANGELOG.md ]; then
            HEADER=$(head -5 CHANGELOG.md)
            TAIL=$(tail -n +6 CHANGELOG.md)
            echo "${HEADER}" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat /tmp/new_entry.md >> CHANGELOG.md
            echo "${TAIL}" >> CHANGELOG.md
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat /tmp/new_entry.md >> CHANGELOG.md
          fi

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update CHANGELOG.md for ${{ github.event.release.tag_name }}"
          file_pattern: CHANGELOG.md
